<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>輸液組成計算シート</title>
<style>
:root {
  --primary: #2563eb;
  --primary-light: #dbeafe;
  --primary-dark: #1d4ed8;
  --success: #059669;
  --success-light: #d1fae5;
  --warning: #d97706;
  --warning-light: #fef3c7;
  --danger: #dc2626;
  --danger-light: #fee2e2;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--gray-100); color: var(--gray-800); line-height: 1.5; min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; padding: 16px 24px; box-shadow: var(--shadow-md);
  display: flex; align-items: center; justify-content: space-between;
}
.header-left h1 { font-size: 20px; font-weight: 700; }
.header-left p { font-size: 13px; opacity: .85; margin-top: 2px; }
.header-right { display: flex; gap: 8px; }
.btn-header {
  padding: 6px 14px; border: 1px solid rgba(255,255,255,.4); border-radius: 4px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  background: rgba(255,255,255,.15); color: #fff; transition: background .15s;
}
.btn-header:hover { background: rgba(255,255,255,.3); }
.container { max-width: 1200px; margin: 0 auto; padding: 16px; }
.patient-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px; }
.patient-card-header { padding: 8px 16px; background: var(--gray-100); font-size: 13px; font-weight: 700; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); }
.patient-bar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; padding: 12px 16px; }
.patient-bar label { font-size: 13px; font-weight: 600; color: var(--gray-600); display: flex; align-items: center; gap: 6px; }
.patient-bar input { width: 70px; padding: 4px 8px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 14px; text-align: right; background: var(--warning-light); }
.patient-bar input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
.patient-bar .unit { font-size: 13px; color: var(--gray-500); }
.patient-bar .bsa-display { font-size: 13px; color: var(--gray-600); background: var(--gray-100); padding: 4px 10px; border-radius: 4px; }
.routes-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 16px; }
.card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.card-header { padding: 10px 16px; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
.card-header.result { background: var(--gray-800); color: #fff; }
.card-body { padding: 12px 16px; }
.line-name-input { border: none; background: transparent; font-size: 14px; font-weight: 700; color: inherit; padding: 0; min-width: 60px; width: auto; max-width: 200px; outline: none; border-bottom: 1px solid transparent; }
.line-name-input:hover, .line-name-input:focus { border-bottom-color: currentColor; }
.btn-remove-line { padding: 2px 8px; border: 1px solid rgba(0,0,0,.15); border-radius: 4px; background: rgba(255,255,255,.5); font-size: 12px; cursor: pointer; color: inherit; opacity: .7; }
.btn-remove-line:hover { opacity: 1; background: rgba(255,255,255,.8); }
.route-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.route-comp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--gray-200); }
.fluid-list { display: flex; flex-direction: column; gap: 6px; }
.fluid-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: var(--gray-50); border-radius: 4px; border: 1px solid var(--gray-200); }
.fluid-item .fluid-name { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fluid-item input { width: 65px; padding: 3px 6px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 13px; text-align: right; background: var(--warning-light); }
.fluid-item input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
.fluid-item .unit { font-size: 12px; color: var(--gray-500); min-width: 20px; }
.fluid-search-select { position: relative; margin-top: 4px; }
.fss-input { width: 100%; padding: 6px 8px; border: 1px dashed var(--gray-300); border-radius: 4px; font-size: 13px; background: #fff; color: var(--gray-800); cursor: text; }
.fss-input::placeholder { color: var(--gray-400); }
.fss-input:focus { outline: none; border-color: var(--primary); border-style: solid; }
.fss-dropdown { display: none; position: fixed; background: #fff; border: 1px solid var(--gray-300); border-radius: 6px; box-shadow: var(--shadow-md); overflow-y: auto; z-index: 1000; }
.fss-dropdown.open { display: block; }
.fss-group-label { padding: 4px 10px; font-size: 11px; font-weight: 700; color: var(--gray-500); background: var(--gray-50); border-bottom: 1px solid var(--gray-100); position: sticky; top: 0; }
.fss-option { padding: 5px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--gray-50); }
.fss-option:hover { background: var(--primary-light); color: var(--primary-dark); }
.fss-option:last-child { border-bottom: none; }
.fss-empty { padding: 12px; text-align: center; font-size: 12px; color: var(--gray-400); }
.btn { padding: 6px 14px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-danger { background: var(--danger-light); color: var(--danger); }
.btn-danger:hover { background: #fecaca; }
.btn-sm { padding: 2px 8px; font-size: 12px; }
.ch-section { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--gray-300); }
.ch-section:first-child { margin-top: 0; padding-top: 0; border-top: none; }
.ch-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ch-label { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 3px; }
.ch-label.main-l { background: var(--primary-light); color: var(--primary-dark); }
.ch-label.side-l { background: var(--warning-light); color: var(--warning); }
.side-name-input { border: none; background: transparent; font-size: 12px; font-weight: 700; color: var(--gray-600); padding: 0; outline: none; border-bottom: 1px solid transparent; min-width: 50px; max-width: 120px; }
.side-name-input:hover, .side-name-input:focus { border-bottom-color: var(--gray-400); }
.btn-remove-side { padding: 1px 6px; border: 1px solid var(--gray-200); border-radius: 3px; background: #fff; font-size: 11px; cursor: pointer; color: var(--gray-400); margin-left: auto; }
.btn-remove-side:hover { color: var(--danger); border-color: var(--danger); }
.mode-toggle { display: inline-flex; border: 1px solid var(--gray-300); border-radius: 4px; overflow: hidden; }
.mode-toggle button { padding: 2px 10px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; background: #fff; color: var(--gray-500); }
.mode-toggle button.active { background: var(--primary); color: #fff; }
.flow-row { margin-top: 6px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.flow-row label { font-size: 12px; color: var(--gray-600); font-weight: 600; display: flex; align-items: center; gap: 3px; }
.flow-row input { width: 50px; padding: 3px 5px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 12px; text-align: right; background: var(--warning-light); }
.flow-row input:focus { outline: none; border-color: var(--primary); }
.flow-row .unit { font-size: 11px; color: var(--gray-500); }
.flow-row .calc-val { font-size: 12px; color: var(--gray-600); background: var(--gray-100); padding: 2px 8px; border-radius: 4px; }
.flow-row .calc-val.clickable { cursor: pointer; border: 1px dashed var(--gray-300); transition: all .15s; }
.flow-row .calc-val.clickable:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary-dark); }
.btn-24h { padding: 2px 8px; border: 1px solid var(--gray-300); border-radius: 4px; background: #fff; color: var(--gray-500); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; display: none; }
.btn-24h:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary-dark); }
.ch-summary { margin-top: 6px; font-size: 12px; display: flex; gap: 10px; flex-wrap: wrap; color: var(--gray-600); }
.ch-summary .val { font-weight: 700; }
.ch-summary .eff { color: var(--warning); font-weight: 600; }
.comp-box { margin-top: 8px; padding: 8px; background: var(--gray-50); border-radius: 4px; font-size: 12px; }
.comp-box.route-comp-norm { background: var(--success-light); border: 1px solid #a7f3d0; }
.comp-box.route-comp-int { background: var(--warning-light); border: 1px solid #fde68a; }
.comp-title { font-weight: 700; font-size: 12px; margin-bottom: 4px; color: var(--gray-700); }
.comp-grid { display: flex; flex-direction: column; gap: 2px; }
.comp-row-group { display: grid; gap: 2px 12px; }
.comp-row-group.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.comp-row { display: flex; justify-content: space-between; padding: 1px 0; }
.comp-row .label { color: var(--gray-500); }
.comp-row .value { font-weight: 600; font-variant-numeric: tabular-nums; }
.comp-row.alert-warn .label, .comp-row.alert-warn .value { color: var(--danger); font-weight: 700; }
.comp-row.alert-info .label, .comp-row.alert-info .value { color: var(--warning); font-weight: 700; }
.alert-row { background: var(--danger-light) !important; }
.alert-row td { color: var(--danger) !important; font-weight: 700 !important; }
.btn-add-side { margin-top: 10px; padding: 5px; border: 1px dashed var(--gray-300); border-radius: 4px; background: #fff; color: var(--gray-400); font-size: 12px; cursor: pointer; width: 100%; }
.btn-add-side:hover { border-color: var(--primary); color: var(--primary); }
.btn-add-route { width: 100%; padding: 12px; border: 2px dashed var(--gray-300); border-radius: var(--radius); background: #fff; color: var(--gray-500); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; margin-bottom: 16px; }
.btn-add-route:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.result-box { padding: 10px 12px; background: var(--gray-50); border-radius: 6px; border: 1px solid var(--gray-200); }
.result-box .r-title { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .3px; margin-bottom: 4px; }
.result-box .r-value { font-size: 20px; font-weight: 700; color: var(--gray-800); font-variant-numeric: tabular-nums; }
.result-box .r-unit { font-size: 12px; color: var(--gray-500); font-weight: 400; }
.result-box .r-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.result-box.highlight { border-color: var(--primary); background: var(--primary-light); }
.result-box.highlight .r-value { color: var(--primary-dark); }
.result-box.warn { border-color: var(--danger); }
.result-box.warn .r-value { color: var(--danger); }
.result-detail { margin-top: 12px; }
.result-detail-title { font-size: 14px; font-weight: 700; color: var(--gray-700); margin-bottom: 8px; }
.detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.detail-table th, .detail-table td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--gray-200); }
.detail-table th { font-weight: 600; color: var(--gray-500); font-size: 12px; background: var(--gray-50); }
.detail-table td { font-variant-numeric: tabular-nums; }
.detail-table td:not(:first-child) { text-align: right; }
.detail-table th:not(:first-child) { text-align: right; }
.nutrition-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
.nutrition-table th, .nutrition-table td { padding: 5px 10px; border-bottom: 1px solid var(--gray-200); }
.nutrition-table th { text-align: left; font-weight: 600; color: var(--gray-500); font-size: 12px; background: var(--gray-50); }
.nutrition-table td { font-variant-numeric: tabular-nums; }
.nutrition-table td:not(:first-child) { text-align: right; }
.nutrition-table th:not(:first-child) { text-align: right; }
.summary-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; margin-top: 12px; }
@media (max-width: 768px) {
  .route-columns { grid-template-columns: 1fr; }
  .route-comp-row { grid-template-columns: 1fr; }
  .summary-grid { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .patient-bar { gap: 10px; }
  .modal { max-width: 100%; border-radius: 8px; }
  .modal-overlay { padding: 16px 8px; }
}
.footer { text-align: center; padding: 16px; font-size: 12px; color: var(--gray-400); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; justify-content: center; align-items: flex-start; padding: 40px 16px; overflow-y: auto; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.2); width: 100%; max-width: 1100px; max-height: calc(100vh - 80px); display: flex; flex-direction: column; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-header h2 { font-size: 16px; font-weight: 700; }
.modal-close { width: 28px; height: 28px; border: none; background: var(--gray-100); border-radius: 4px; cursor: pointer; font-size: 16px; color: var(--gray-500); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--gray-200); }
.modal-body { padding: 0 20px 16px; overflow: auto; flex: 1; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
.fluid-edit-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.fluid-edit-table th, .fluid-edit-table td { padding: 4px 4px; border: 1px solid var(--gray-200); text-align: center; }
.fluid-edit-table th { background: var(--gray-100); font-weight: 600; color: var(--gray-600); font-size: 11px; position: sticky; top: 0; z-index: 1; }
.fluid-edit-table input { width: 100%; min-width: 45px; padding: 2px 4px; border: 1px solid var(--gray-200); border-radius: 3px; font-size: 12px; text-align: right; background: #fff; }
.fluid-edit-table input:focus { outline: none; border-color: var(--primary); }
.fluid-edit-table input.name-input { text-align: left; min-width: 100px; }
.fluid-edit-table .del-btn { width: 22px; height: 22px; border: none; background: var(--danger-light); color: var(--danger); border-radius: 3px; cursor: pointer; font-size: 11px; }
.fluid-edit-table .toggle-btn { width: 22px; height: 22px; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; line-height: 1; }
.fluid-edit-table .toggle-btn.on { background: var(--success-light); color: var(--success); }
.fluid-edit-table .toggle-btn.off { background: var(--gray-200); color: var(--gray-400); }
.fluid-edit-table .cat-row td { background: var(--gray-700); color: #fff; font-weight: 700; font-size: 12px; padding: 5px 8px; text-align: left; border: none; position: sticky; top: 26px; z-index: 1; }
.fluid-edit-table .move-btns { display: flex; flex-direction: column; gap: 1px; }
.fluid-edit-table .move-btn { width: 20px; height: 14px; border: 1px solid var(--gray-200); background: #fff; color: var(--gray-500); border-radius: 2px; cursor: pointer; font-size: 9px; line-height: 1; padding: 0; display: flex; align-items: center; justify-content: center; }
.fluid-edit-table .move-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
.btn-add-row { margin-top: 8px; padding: 6px 12px; border: 1px dashed var(--gray-300); border-radius: 4px; background: #fff; color: var(--gray-500); font-size: 13px; cursor: pointer; width: 100%; }
.btn-add-row:hover { border-color: var(--primary); color: var(--primary); }
.btn-outline { padding: 6px 14px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; background: #fff; color: var(--gray-600); }
.btn-outline:hover { border-color: var(--gray-400); }
.btn-outline.danger { border-color: var(--danger); color: var(--danger); }
.btn-outline.danger:hover { background: var(--danger-light); }
.line-c0 { background: #dbeafe; color: #1d4ed8; }
.line-c1 { background: #d1fae5; color: #059669; }
.line-c2 { background: #fef3c7; color: #d97706; }
.line-c3 { background: #ede9fe; color: #7c3aed; }
.line-c4 { background: #fce7f3; color: #db2777; }
.line-c5 { background: #ccfbf1; color: #0d9488; }
.no-int-msg { color: var(--gray-400); font-size: 12px; padding: 8px 0; text-align: center; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left"><h1>輸液組成計算シート</h1><p>ルートごとにメイン・側管を設定し、輸液の組成を計算できます。</p></div>
  <div class="header-right"><button class="btn-header" onclick="openSettings()">&#9881; 製剤設定</button></div>
</div>
<div class="container">
  <div class="patient-card">
    <div class="patient-card-header">患者情報</div>
    <div class="patient-bar">
      <label>身長 <input type="number" id="height" value="" step="0.1" placeholder="cm"> <span class="unit">cm</span></label>
      <label>体重 <input type="number" id="weight" value="" step="0.1" placeholder="kg"> <span class="unit">kg</span></label>
      <span class="bsa-display" id="bsa-display">体表面積: — ㎡</span>
    </div>
  </div>
  <div class="routes-list" id="routes-container"></div>
  <button class="btn-add-route" onclick="addRoute()">＋ ルートを追加</button>
  <div class="card">
    <div class="card-header result" id="result-header">輸液組成 合計</div>
    <div class="card-body">
      <div class="result-grid" id="result-summary"></div>
      <div class="summary-grid">
        <div class="result-detail"><div class="result-detail-title">電解質・成分 詳細</div>
          <table class="detail-table"><thead><tr><th>成分</th><th>1日投与量</th><th>投与量/kg/day</th></tr></thead><tbody id="electrolyte-tbody"></tbody></table></div>
        <div class="result-detail"><div class="result-detail-title">栄養組成</div>
          <table class="nutrition-table"><thead><tr><th>成分</th><th>投与量 (g/kg/day)</th><th>カロリー比</th></tr></thead><tbody id="nutrition-tbody"></tbody></table></div>
      </div>
    </div>
  </div>
</div>
<div class="footer">輸液組成計算シート — 臨床参考用（処方は必ず医師の判断に基づいてください）</div>
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-header"><h2>製剤リスト設定</h2><button class="modal-close" onclick="closeSettings()">&#10005;</button></div>
    <div class="modal-body" id="settings-body"></div>
    <div class="modal-footer">
      <div style="display:flex;gap:8px;flex:1">
        <button class="btn-outline danger" onclick="resetFluidsToDefault()">デフォルトに戻す</button>
        <button class="btn-outline" style="font-weight:700" onclick="downloadConfiguredHTML()">&#128190; 設定込みHTMLを保存</button>
      </div>
      <button class="btn btn-primary" onclick="closeSettings()">閉じる</button>
    </div>
  </div>
</div>
<script>
var LINE_COLORS=6, nextRouteId=1, nextSideId=1;
var COMP_KEYS=["glu","na","k","cl","ca","mg","p","aa","fat","hco3","heparin"];
var FLUID_CATS=[
  {key:'ecf',label:'細胞外液補充液'},{key:'start',label:'開始液（1号液）'},{key:'maint',label:'維持液（3号液）'},
  {key:'glu',label:'ブドウ糖液'},{key:'ppn',label:'末梢静脈栄養（PPN）'},{key:'tpn',label:'中心静脈栄養（TPN）'},
  {key:'conc',label:'高濃度補正液'},{key:'amino',label:'アミノ酸製剤'},{key:'lipid',label:'脂肪乳剤'},
  {key:'vitmin',label:'ビタミン・微量元素'},{key:'elyte',label:'電解質補正液'},{key:'other',label:'その他'}
];
var DEFAULT_FLUIDS=[
  {id:"ns",cat:"ecf",name:"生理食塩液",defaultVol:500,enabled:true,glu:0,na:154,k:0,cl:154,ca:0,mg:0,p:0,aa:0,fat:0,hco3:0,heparin:0},
  {id:"solulyte",cat:"ecf",name:"ソリューゲンF",defaultVol:500,enabled:true,glu:0,na:130,k:4,cl:109,ca:3,mg:0,p:0,aa:0,fat:0,hco3:28,heparin:0},

var fluids=JSON.parse(JSON.stringify(DEFAULT_FLUIDS)), routes=[];
function getEnabledFluids(){return fluids.filter(function(f){return f.enabled})}
function getFluidById(id){return fluids.find(function(f){return f.id===id})}
function R(rid){return routes.find(function(r){return r.id===rid})}
function S(rid,sid){var rt=R(rid);return rt?rt.sides.find(function(s){return s.id===sid}):null}
function CH(rid,ct,cid){var rt=R(rid);if(!rt)return null;return ct==='main'?rt.main:rt.sides.find(function(s){return s.id===cid})}
function CK(rid,ct,cid){return rid+'-'+(ct==='main'?'main':cid)}
function chTotal(ch){return ch.fluids.reduce(function(s,e){return s+e.volume},0)}
function chComp(ch){
  var t=chTotal(ch),c={};COMP_KEYS.forEach(function(k){c[k]=0});if(t===0)return c;
  ch.fluids.forEach(function(e){var f=getFluidById(e.id);if(!f)return;COMP_KEYS.forEach(function(k){c[k]+=e.volume*(f[k]||0)})});
  COMP_KEYS.forEach(function(k){c[k]/=t});return c;
}
function nextName(prefix,items,key){var u={};items.forEach(function(i){var m=(i[key]||'').match(new RegExp('^'+prefix+'\\s*(\\d+)$'));if(m)u[parseInt(m[1])]=true});var n=1;while(u[n])n++;return prefix+' '+n}

function addRoute(){var rid='r'+nextRouteId++;routes.push({id:rid,name:nextName('ライン',routes,'name'),main:{fluids:[],rate:0,hours:24},sides:[]});renderAll();recalc()}

function removeSide(rid,sid){var rt=R(rid);if(!rt)return;rt.sides=rt.sides.filter(function(s){return s.id!==sid});renderAll();recalc()}

var fssAnchor=null;
function buildSelector(rid,ct,cid){
  var ch=CH(rid,ct,cid);if(!ch)return '';var used={};ch.fluids.forEach(function(e){used[e.id]=true});
  var av=getEnabledFluids().filter(function(f){return !used[f.id]});if(av.length===0)return '';
  return '<div class="fluid-search-select"><input type="text" class="fss-input" placeholder="＋ 輸液を追加…" data-rid="'+rid+'" data-ct="'+ct+'" data-cid="'+(cid||'')+'" onfocus="openFSS(this)" oninput="filterFSS()" onkeydown="if(event.key===\'Escape\'){closeFSS();this.blur()}"></div>';
}
function openFSS(inp){
  closeFSS();fssAnchor=inp;
  var rid=inp.dataset.rid,ct=inp.dataset.ct,cid=inp.dataset.cid;
  var ch=CH(rid,ct,cid);if(!ch)return;
  var used={};ch.fluids.forEach(function(e){used[e.id]=true});
  var av=getEnabledFluids().filter(function(f){return !used[f.id]});
  var portal=document.getElementById('fss-portal'),h='';
  FLUID_CATS.forEach(function(cat){
    var items=av.filter(function(f){return(f.cat||'other')===cat.key});if(items.length===0)return;
    h+='<div class="fss-group"><div class="fss-group-label">'+esc(cat.label)+'</div>';
    items.forEach(function(f){h+='<div class="fss-option" onmousedown="event.preventDefault();selectFSS(\''+f.id+'\')">'+esc(f.name)+'</div>'});
    h+='</div>'});
  portal.innerHTML=h;
  var r=inp.getBoundingClientRect(),sb=window.innerHeight-r.bottom-8,above=sb<200;
  portal.style.left=r.left+'px';portal.style.width=Math.max(r.width,280)+'px';
  if(above){portal.style.bottom=(window.innerHeight-r.top+2)+'px';portal.style.top='auto';portal.style.maxHeight=(r.top-8)+'px'}
  else{portal.style.top=(r.bottom+2)+'px';portal.style.bottom='auto';portal.style.maxHeight=sb+'px'}
  portal.classList.add('open');inp.value='';
}
function filterFSS(){
  var portal=document.getElementById('fss-portal');if(!fssAnchor)return;
  var q=(fssAnchor.value||'').toLowerCase(),any=false;
  portal.querySelectorAll('.fss-group').forEach(function(grp){
    var vis=false;
    grp.querySelectorAll('.fss-option').forEach(function(opt){
      var show=!q||opt.textContent.toLowerCase().indexOf(q)>=0;
      opt.style.display=show?'':'none';if(show)vis=true});
    grp.style.display=vis?'':'none';if(vis)any=true});
  var em=portal.querySelector('.fss-empty');
  if(!any){if(!em){em=document.createElement('div');em.className='fss-empty';em.textContent='該当なし';portal.appendChild(em)}}
  else if(em)em.remove();
}
function selectFSS(fid){
  if(!fssAnchor)return;
  var rid=fssAnchor.dataset.rid,ct=fssAnchor.dataset.ct,cid=fssAnchor.dataset.cid;
  var fl=getFluidById(fid),ch=CH(rid,ct,cid);if(!fl||!ch)return;
  ch.fluids.push({id:fid,volume:fl.defaultVol});closeFSS();renderFL(rid,ct,cid);recalc();
  var items=document.querySelectorAll('#flist-'+CK(rid,ct,cid)+' .fluid-item');
  if(items.length>0){var inp=items[items.length-1].querySelector('input');if(inp)inp.select()}
}
function closeFSS(){document.getElementById('fss-portal').classList.remove('open');fssAnchor=null}

function rmFluid(rid,ct,cid,fid){var ch=CH(rid,ct,cid);if(!ch)return;ch.fluids=ch.fluids.filter(function(e){return e.id!==fid});renderFL(rid,ct,cid);recalc()}
function updVol(rid,ct,cid,fid,val){var ch=CH(rid,ct,cid);if(!ch)return;var e=ch.fluids.find(function(e){return e.id===fid});if(e)e.volume=parseFloat(val)||0;recalc()}
function renderFL(rid,ct,cid){
  var ck=CK(rid,ct,cid),el=document.getElementById('flist-'+ck);if(!el)return;var ch=CH(rid,ct,cid);if(!ch)return;var h='';
  ch.fluids.forEach(function(entry){var fl=getFluidById(entry.id);if(!fl)return;var step=entry.id==='heparin'?'0.1':'1';
    h+='<div class="fluid-item"><span class="fluid-name" title="'+esc(fl.name)+'">'+esc(fl.name)+'</span>';
    h+='<input type="number" value="'+entry.volume+'" step="'+step+'" min="0" oninput="updVol(\''+rid+'\',\''+ct+'\',\''+(cid||'')+'\',\''+entry.id+'\',this.value)">';

  h+=buildSelector(rid,ct,cid);el.innerHTML=h;
}

function fmt(v,d){if(v===null||v===undefined||isNaN(v)||!isFinite(v))return"—";return v.toFixed(d!==undefined?d:2)}
function esc(s){return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function cr(l,v,al){var c=al==='warn'?' alert-warn':al==='info'?' alert-info':'';return'<div class="comp-row'+c+'"><span class="label">'+l+'</span><span class="value">'+v+(al?' &#9888;':'')+'</span></div>'}
function calcOsm(c){return c.na+c.k+c.cl+c.ca/2+c.mg/2+c.hco3+c.glu*5.56+(c.aa||0)*10+(c.fat||0)*0.7}
function calcCaP(c){return c.ca*(c.p/31)}

function renderComp(elId,comp,rate,wt){

  var row4='<div class="comp-row-group cols-3">'+(comp.ca>0&&comp.p>0?cr('Ca×P積',fmt(caP,1),caP>72?'warn':null):'<div></div>')+cr('重炭酸',fmt(comp.hco3,1)+' mEq/L')+(comp.aa>0?cr('アミノ酸',fmt(comp.aa,1)+' g/L'):'<div></div>')+'</div>';
  var ex=[];if(comp.fat>0)ex.push(cr('脂肪',fmt(comp.fat,1)+' g/L'));
  if(comp.heparin>0)ex.push(cr('ヘパリン',fmt(comp.heparin,1)+' U/mL',comp.heparin>1.1?'warn':null));
  g.innerHTML=
    '<div class="comp-row-group cols-3">'+cr('ブドウ糖濃度',fmt(gp,1)+'%',gp>12.5?'info':null)+cr('GIR',fmt(gir,2)+' mg/kg/min',gir>12?'warn':null)+cr('浸透圧',fmt(osm,0)+' mOsm/L',osm>900?'info':null)+'</div>'+
    '<div class="comp-row-group cols-3">'+cr('Na',fmt(comp.na,1)+' mEq/L')+cr('K',fmt(comp.k,1)+' mEq/L',comp.k>40?'warn':null)+cr('Cl',fmt(comp.cl,1)+' mEq/L')+'</div>'+
    '<div class="comp-row-group cols-3">'+cr('Ca',fmt(comp.ca,1)+' mEq/L')+cr('Mg',fmt(comp.mg,1)+' mEq/L')+cr('P',fmt(comp.p,0)+' mg/L')+'</div>'+
    row4+
    (ex.length?'<div class="comp-row-group cols-3">'+ex.join('')+'<div></div>'.repeat(3-ex.length)+'</div>':'');
}

function updateBag(rid,bh,ch){
  var el=document.getElementById('bag-'+rid),b24=document.getElementById('btn24-'+rid);if(!el||!b24)return;
  b24.style.display=Math.abs(ch-24)<.05?'none':'inline-block';
  if(bh<=0){el.textContent='1本あたり: — h';el.className='calc-val';el.onclick=null;el.title='';return}
  var rd=Math.round(bh*10)/10;el.textContent='1本あたり: '+fmt(bh,1)+' h';
  if(Math.abs(rd-ch)<.05){el.className='calc-val';el.onclick=null;el.title=''}
  else{el.className='calc-val clickable';el.title='クリックで投与時間を '+fmt(bh,1)+' h に設定';el.onclick=(function(id,h){return function(){setMH(id,h)}})(rid,rd)}
}

function calcRouteCompNorm(rt){
  var mc=chComp(rt.main),mr=rt.main.rate;
  var totalRate=mr,w={},parts=[{name:'メイン',rate:mr}];
  COMP_KEYS.forEach(function(k){w[k]=mc[k]*mr});
  rt.sides.forEach(function(s){
    if(s.mode==='continuous'&&s.rate>0){
      var sc=chComp(s);totalRate+=s.rate;
      COMP_KEYS.forEach(function(k){w[k]+=sc[k]*s.rate});
      parts.push({name:s.name,rate:s.rate});
    }
  });
  var comp={};COMP_KEYS.forEach(function(k){comp[k]=totalRate>0?w[k]/totalRate:0});
  return{comp:comp,totalRate:totalRate,parts:parts};
}

function calcRouteCompInt(rt){
  var mc=chComp(rt.main),mr=rt.main.rate;
  var hasInt=false;
  var effMainRate=mr;
  rt.sides.forEach(function(s){
    if(s.mode==='intermittent'){
      hasInt=true;
      if(s.mainRateDuring!==null) effMainRate=Math.min(effMainRate,s.mainRateDuring);
    }
  });
  if(!hasInt)return null;
  var totalRate=effMainRate,w={},parts=[{name:'メイン',rate:effMainRate}];
  COMP_KEYS.forEach(function(k){w[k]=mc[k]*effMainRate});
  rt.sides.forEach(function(s){
    if(s.mode==='continuous'&&s.rate>0){
      var sc=chComp(s);totalRate+=s.rate;
      COMP_KEYS.forEach(function(k){w[k]+=sc[k]*s.rate});
      parts.push({name:s.name,rate:s.rate});
    }
  });
  rt.sides.forEach(function(s){
    if(s.mode==='intermittent'&&s.rate>0){
      var sc=chComp(s);totalRate+=s.rate;
      COMP_KEYS.forEach(function(k){w[k]+=sc[k]*s.rate});
      parts.push({name:s.name,rate:s.rate});
    }
  });
  var comp={};COMP_KEYS.forEach(function(k){comp[k]=totalRate>0?w[k]/totalRate:0});
  return{comp:comp,totalRate:totalRate,effMainRate:effMainRate,parts:parts};
}

function recalc(){
  var wt=parseFloat(document.getElementById('weight').value)||0;
  var ht=parseFloat(document.getElementById('height').value)||0;
  var bsa=ht>0&&wt>0?Math.sqrt(ht*wt/3600):0;
  document.getElementById('bsa-display').textContent=bsa>0?'体表面積: '+fmt(bsa,4)+' ㎡':'体表面積: — ㎡';

  var totalWater=0,dayAmt={};
  COMP_KEYS.forEach(function(k){dayAmt[k]=0});

  routes.forEach(function(rt){
    var rid=rt.id,mc=chComp(rt.main),mt=chTotal(rt.main),mr=rt.main.rate,mh=rt.main.hours;
    var mainVolDay=mr*mh;
    rt.sides.forEach(function(s){
      if(s.mode==='intermittent'&&s.mainRateDuring!==null){
        var st=s.duration*s.timesPerDay;
        mainVolDay+=(s.mainRateDuring-mr)*st;
      }
    });
    mainVolDay=Math.max(0,mainVolDay);

    document.getElementById('total-'+rid+'-main').textContent=mt+' ml';
    document.getElementById('dayvol-'+rid+'-main').textContent=fmt(mr*mh,0)+' ml';
    updateBag(rid,mr>0?mt/mr:0,mh);
    renderComp('comp-'+rid+'-main',mc,mr,wt);

    var hasIntChange=rt.sides.some(function(s){return s.mode==='intermittent'&&s.mainRateDuring!==null});
    var effEl=document.getElementById('eff-'+rid);
    var ehEl=document.getElementById('eff-hours-'+rid);
    if(hasIntChange&&mr>0){
      var reducedTime=0;
      rt.sides.forEach(function(s){if(s.mode==='intermittent'&&s.mainRateDuring!==null)reducedTime+=s.duration*s.timesPerDay});
      var normalTime=Math.max(0,mh-reducedTime);
      if(ehEl){ehEl.style.display='inline';ehEl.textContent='(実効 '+fmt(normalTime,1)+'h)'}
      if(effEl){
        var desc=fmt(normalTime,1)+'h通常';
        var minMRD=mr;rt.sides.forEach(function(s){if(s.mode==='intermittent'&&s.mainRateDuring!==null)minMRD=Math.min(minMRD,s.mainRateDuring)});
        if(minMRD===0)desc+=' + '+fmt(reducedTime,1)+'h停止';
        else desc+=' + '+fmt(reducedTime,1)+'h('+fmt(minMRD,1)+'ml/h)';
        effEl.style.display='inline';effEl.textContent='実効: '+desc+' → '+fmt(mainVolDay,0)+' ml/日';
      }
    } else {
      if(ehEl)ehEl.style.display='none';
      if(effEl)effEl.style.display='none';
    }

    COMP_KEYS.forEach(function(k){dayAmt[k]+=mc[k]*mainVolDay});
    totalWater+=mainVolDay;

    // Sides
    rt.sides.forEach(function(s){
      var sc=chComp(s),st=chTotal(s);
      var sVolDay=s.mode==='continuous'?s.rate*(s.hours!=null?s.hours:mh):s.rate*s.duration*s.timesPerDay;
      var smEl=document.getElementById('sidesm-'+rid+'-'+s.id);
      if(smEl){
        if(s.mode==='continuous'){
          smEl.innerHTML='<span>合計: <span class="val">'+st+' ml</span></span><span>1日量: <span class="val">'+fmt(sVolDay,0)+' ml</span></span>';
        } else {
          var dose=s.rate*s.duration;
          smEl.innerHTML='<span>1回量: <span class="val">'+fmt(dose,0)+' ml</span></span><span>1日量: <span class="val">'+fmt(sVolDay,0)+' ml</span></span><span>合計(バッグ): <span class="val">'+st+' ml</span></span>';
        }
      }
      renderComp('comp-'+rid+'-'+s.id,sc,s.rate,wt);
      COMP_KEYS.forEach(function(k){dayAmt[k]+=sc[k]*sVolDay});
      totalWater+=sVolDay;
    });

    // Route composition: normal (常時)
    var normEl=document.getElementById('comp-'+rid+'-norm');
    if(normEl){
      var norm=calcRouteCompNorm(rt);
      renderComp('comp-'+rid+'-norm',norm.comp,norm.totalRate,wt);
      var nrEl=document.getElementById('route-rate-norm-'+rid);
      if(nrEl){
        if(norm.parts.length>1){var pd=norm.parts.map(function(p){return p.name+':'+fmt(p.rate,1)}).join(' + ');nrEl.textContent='('+fmt(norm.totalRate,1)+' ml/h = '+pd+')';}
        else nrEl.textContent='('+fmt(norm.totalRate,1)+' ml/h)';
      }
    }
    // Route composition: intermittent (間欠時)
    var intEl=document.getElementById('comp-'+rid+'-int');
    if(intEl){
      var intR=calcRouteCompInt(rt);
      if(intR){
        renderComp('comp-'+rid+'-int',intR.comp,intR.totalRate,wt);
        var irEl=document.getElementById('route-rate-int-'+rid);
        if(irEl){
          var pd=intR.parts.map(function(p){return p.name+':'+fmt(p.rate,1)}).join(' + ');
          irEl.textContent='('+fmt(intR.totalRate,1)+' ml/h = '+pd+')';
        }
      }
    }
  });

  // Totals
  var tGlu=dayAmt.glu/1000,tAa=dayAmt.aa/1000,tFat=dayAmt.fat/1000;
  var girAvg=wt>0?tGlu*1000/1440/wt:0;
  var gKg=wt>0?tGlu/wt:0,aKg=wt>0?tAa/wt:0,fKg=wt>0?tFat/wt:0;
  var eqK=gKg*4+aKg*4+fKg*9,tK=eqK*wt;
  var pR=eqK>0?aKg*4/eqK:0,fR=eqK>0?fKg*9/eqK:0,gR=eqK>0?1-pR-fR:0;
  var fOver=wt>0&&fKg>2;
  updateResultHeader();
  var fC=fOver?'result-box warn':'result-box',gC=girAvg>12?'result-box warn':'result-box highlight';
  document.getElementById('result-summary').innerHTML=
    '<div class="result-box highlight"><div class="r-title">水分量</div><div class="r-value">'+fmt(totalWater,0)+' <span class="r-unit">ml/day</span></div><div class="r-sub">'+(wt>0?fmt(totalWater/wt,1)+' ml/kg/day':'—')+(bsa>0?' / '+fmt(totalWater/bsa,0)+' ml/㎡/day':'')+'</div></div>'+
    '<div class="result-box highlight"><div class="r-title">カロリー</div><div class="r-value">'+fmt(eqK,1)+' <span class="r-unit">kcal/kg/day</span></div><div class="r-sub">'+fmt(tK,0)+' kcal/day</div></div>'+
    '<div class="'+gC+'"><div class="r-title">GIR（平均）</div><div class="r-value">'+fmt(girAvg,2)+' <span class="r-unit">mg/kg/min</span></div>'+(girAvg>12?'<div class="r-sub" style="color:var(--danger)">&#9888; 高血糖リスク</div>':'')+'</div>'+
    '<div class="result-box"><div class="r-title">アミノ酸</div><div class="r-value">'+fmt(aKg,2)+' <span class="r-unit">g/kg/day</span></div></div>'+
    '<div class="'+fC+'"><div class="r-title">脂肪</div><div class="r-value">'+fmt(fKg,2)+' <span class="r-unit">g/kg/day</span></div>'+(fOver?'<div class="r-sub" style="color:var(--danger)">&#9888; 上限 2 g/kg/day 超過</div>':'')+'</div>';

  // Electrolyte table (no concentration column)
  var eItems=[{n:"Na",du:"mEq/day",ku:"mEq/kg/day",k:"na"},{n:"K",du:"mEq/day",ku:"mEq/kg/day",k:"k"},{n:"Cl",du:"mEq/day",ku:"mEq/kg/day",k:"cl"},{n:"Ca",du:"mEq/day",ku:"mEq/kg/day",k:"ca"},{n:"Mg",du:"mEq/day",ku:"mEq/kg/day",k:"mg"},{n:"P",du:"mg/day",ku:"mg/kg/day",k:"p"},{n:"重炭酸",du:"mEq/day",ku:"mEq/kg/day",k:"hco3"}];
  var eT=document.getElementById('electrolyte-tbody');eT.innerHTML='';
  eItems.forEach(function(i){
    var day=dayAmt[i.k]/1000,kg=wt>0?day/wt:0;
    var tr=document.createElement('tr');
    tr.innerHTML='<td>'+i.n+'</td><td>'+fmt(day)+' '+i.du+'</td><td>'+fmt(kg)+' '+i.ku+'</td>';eT.appendChild(tr)});
  var hDay=dayAmt.heparin/1000;
  if(hDay>0){var tr=document.createElement('tr');tr.innerHTML='<td>ヘパリン</td><td>'+fmt(hDay,0)+' 単位/day</td><td>'+(wt>0?fmt(hDay/wt,1)+' 単位/kg/day':'—')+'</td>';eT.appendChild(tr)}

  // Nutrition
  var nT=document.getElementById('nutrition-tbody');nT.innerHTML='';
  [{n:"タンパク+Aa",v:aKg,r:pR},{n:"脂質",v:fKg,r:fR},{n:"糖質",v:gKg,r:gR}].forEach(function(x){
    var tr=document.createElement('tr');tr.innerHTML='<td>'+x.n+'</td><td>'+fmt(x.v,2)+'</td><td>'+(eqK>0?fmt(x.r*100,1)+'%':'—')+'</td>';nT.appendChild(tr)});

  saveState();
}

function updateResultHeader(){
  var ns=routes.map(function(r){return r.name||'ライン'});
  document.getElementById('result-header').textContent=ns.length>0?'輸液組成（'+ns.join(' + ')+'）合計':'輸液組成 合計';
}

// Settings
function openSettings(){renderSettingsTable();document.getElementById('settings-modal').classList.add('open')}
function closeSettings(){document.getElementById('settings-modal').classList.remove('open');renderAll();recalc()}
function renderSettingsTable(){
  var b=document.getElementById('settings-body');
  var cols=["Glu(g/L)","Na","K","Cl","Ca","Mg","P(mg/L)","Aa(g/L)","脂肪(g/L)","HCO3","Hep(U/mL)"];
  var keys=["glu","na","k","cl","ca","mg","p","aa","fat","hco3","heparin"];
  var ncol=cols.length+4;
  var h='<table class="fluid-edit-table"><thead><tr><th></th><th>★</th><th>製剤名</th><th>ml</th>';
  cols.forEach(function(c){h+='<th>'+c+'</th>'});h+='<th></th></tr></thead><tbody>';
  FLUID_CATS.forEach(function(cat){
    var items=[];fluids.forEach(function(f,i){if((f.cat||'other')===cat.key)items.push({f:f,i:i})});
    if(items.length===0)return;
    h+='<tr class="cat-row"><td colspan="'+ncol+'">'+esc(cat.label)+'</td></tr>';
    items.forEach(function(item,pos){var f=item.f,i=item.i;
      h+='<tr><td><div class="move-btns">';
      h+='<button class="move-btn" onclick="moveFluid('+i+',-1)"'+(pos===0?' disabled':'')+'>&#9650;</button>';
      h+='<button class="move-btn" onclick="moveFluid('+i+',1)"'+(pos===items.length-1?' disabled':'')+'>&#9660;</button></div></td>';
      h+='<td><button class="toggle-btn '+(f.enabled?'on':'off')+'" onclick="toggleFluid('+i+')">'+(f.enabled?'★':'☆')+'</button></td>';
      h+='<td><input class="name-input" value="'+esc(f.name)+'" onchange="updFP('+i+',\'name\',this.value)"></td>';
      h+='<td><input type="number" value="'+f.defaultVol+'" min="0" onchange="updFP('+i+',\'defaultVol\',parseFloat(this.value)||0)"></td>';
      keys.forEach(function(k){h+='<td><input type="number" value="'+(f[k]||0)+'" step="any" onchange="updFP('+i+',\''+k+'\',parseFloat(this.value)||0)"></td>'});
      h+='<td><button class="del-btn" onclick="delFluid('+i+')">&#10005;</button></td></tr>'});
  });
  h+='</tbody></table><button class="btn-add-row" onclick="addFluid()">＋ 新しい製剤を追加</button>';b.innerHTML=h;
}
function moveFluid(idx,dir){
  var cat=fluids[idx].cat||'other';
  var samecat=[];fluids.forEach(function(f,j){if((f.cat||'other')===cat)samecat.push(j)});
  var pos=samecat.indexOf(idx),np=pos+dir;
  if(np<0||np>=samecat.length)return;
  var other=samecat[np],tmp=fluids[idx];fluids[idx]=fluids[other];fluids[other]=tmp;
  saveFluids();renderSettingsTable();
}
function toggleFluid(i){fluids[i].enabled=!fluids[i].enabled;saveFluids();renderSettingsTable()}
function updFP(i,p,v){fluids[i][p]=v;saveFluids()}
function delFluid(i){if(!confirm('"'+fluids[i].name+'" を削除？'))return;var fid=fluids[i].id;fluids.splice(i,1);
  routes.forEach(function(rt){rt.main.fluids=rt.main.fluids.filter(function(e){return e.id!==fid});rt.sides.forEach(function(s){s.fluids=s.fluids.filter(function(e){return e.id!==fid})})});
  saveFluids();renderSettingsTable()}
function addFluid(){var o={id:'c_'+Date.now(),cat:'other',name:'新規製剤',defaultVol:500,enabled:true};COMP_KEYS.forEach(function(k){o[k]=0});fluids.push(o);saveFluids();renderSettingsTable();
  var tb=document.querySelector('.fluid-edit-table tbody');if(tb&&tb.lastElementChild){var inp=tb.lastElementChild.querySelector('.name-input');if(inp){inp.focus();inp.select()}}}
function resetFluidsToDefault(){if(!confirm('デフォルトに戻しますか？'))return;fluids=JSON.parse(JSON.stringify(DEFAULT_FLUIDS));saveFluids();
  routes.forEach(function(rt){rt.main.fluids=[];rt.sides.forEach(function(s){s.fluids=[]})});renderSettingsTable();renderAll();recalc()}
function downloadConfiguredHTML(){
  var html=document.documentElement.outerHTML;
  html=html.replace(/var DEFAULT_FLUIDS=\[[\s\S]*?\];/,'var DEFAULT_FLUIDS='+JSON.stringify(fluids)+';');
  var blob=new Blob(['<!DOCTYPE html>\n<html lang="ja">\n'+html.slice(html.indexOf('<head'))],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='輸液組成計算シート.html';a.click();URL.revokeObjectURL(a.href);
}

// Persistence
var STORAGE_PREFIX='iv-calc_'+location.pathname+'_';
function saveFluids(){try{localStorage.setItem(STORAGE_PREFIX+'fluids',JSON.stringify(fluids))}catch(e){}}
function loadFluids(){try{var r=localStorage.getItem(STORAGE_PREFIX+'fluids');if(r){var p=JSON.parse(r);
  var defCat={};DEFAULT_FLUIDS.forEach(function(df){defCat[df.id]=df.cat});
  p.forEach(function(f){COMP_KEYS.forEach(function(k){if(f[k]===undefined)f[k]=0});if(!f.cat)f.cat=defCat[f.id]||'other'});
  var ids={};p.forEach(function(f){ids[f.id]=true});DEFAULT_FLUIDS.forEach(function(df){if(!ids[df.id])p.push(JSON.parse(JSON.stringify(df)))});fluids=p}}catch(e){}}
function saveState(){try{localStorage.setItem(STORAGE_PREFIX+'state',JSON.stringify({height:document.getElementById('height').value,weight:document.getElementById('weight').value,routes:routes,nextRouteId:nextRouteId,nextSideId:nextSideId}))}catch(e){}}
function loadState(){try{var r=localStorage.getItem(STORAGE_PREFIX+'state');if(!r)return false;var d=JSON.parse(r);
  if(d.height)document.getElementById('height').value=d.height;if(d.weight)document.getElementById('weight').value=d.weight;
  if(d.routes&&d.routes.length>0){routes=d.routes.map(function(rt){rt.main.fluids=rt.main.fluids.filter(function(e){return getFluidById(e.id)});
    if(!rt.sides)rt.sides=[];rt.sides.forEach(function(s){s.fluids=s.fluids.filter(function(e){return getFluidById(e.id)});
    if(!s.mode)s.mode='continuous';if(s.mainRateDuring===undefined)s.mainRateDuring=null;if(!s.hours)s.hours=24;if(!s.duration)s.duration=1;if(!s.timesPerDay)s.timesPerDay=1});return rt});
    nextRouteId=d.nextRouteId||routes.length+1;nextSideId=d.nextSideId||1;return true}
  if(d.lines&&d.lines.length>0){routes=d.lines.map(function(l,i){return{id:'r'+(i+1),name:l.name||'ライン '+(i+1),main:{fluids:l.fluids.filter(function(e){return getFluidById(e.id)}),rate:l.rate||0,hours:l.hours!=null?l.hours:24},sides:[]}});
    nextRouteId=routes.length+1;return true}}catch(e){}return false}

// Init
document.getElementById('height').addEventListener('input',recalc);
document.getElementById('weight').addEventListener('input',recalc);
loadFluids();var hs=loadState();if(!hs)addRoute();renderAll();recalc();
</script>
